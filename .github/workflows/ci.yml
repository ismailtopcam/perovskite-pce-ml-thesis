# Surekli entegrasyon: her push/PR'da birim testler kosulur.
# Testler ham veri gerektirmez (sentetik veriyle calisir); requirements.txt'in
# bildirdigi alt-sinir uyumlulugu da eski Python surumuyle dolayli sinanir.
name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Test bagimliliklarini kur (hafif kume; boosting kutuphaneleri testlerde kullanilmaz)
        run: |
          python -m pip install --upgrade pip
          pip install numpy pandas scikit-learn scipy pyyaml pytest
      - name: Birim testleri calistir
        run: python -m pytest -q
